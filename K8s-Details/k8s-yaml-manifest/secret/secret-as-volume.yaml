#Secret
apiVersion: v1
kind: Secret
metadata:
  name: db-secret

stringData:
  password: MyPassword123

---

#Pod
apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-demo
spec:
  containers:
  - name: app
    image: nginx

    volumeMounts:
    - name: secret-vol
      mountPath: /etc/secrets

  volumes:
  - name: secret-vol
    secret:
      secretName: db-secret

