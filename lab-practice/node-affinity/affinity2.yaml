apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  labels:
    run: redis
  name: redis-3
spec:
  containers:
  - image: redis
    name: redis
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:  #this is required node affinity
        - weight: 1
          preference:
          matchExpressions:
          - key: disktype
            operator: In  #we can use other operators like NotIn, Exists, DoesNotExist, Gt, Lt
              values:  #we can add multiple values here
                - hdd