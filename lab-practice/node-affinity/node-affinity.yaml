apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  labels:
    run: redis
  name: redis-3
spec:
  containers:
  - image: redis
    name: redis
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:  #this is required node affinity
          nodeSelectorTerms:
          - matchExpressions:
              - key: disktype
                operator: In
                values:  #we can add multiple values here
                - ssd